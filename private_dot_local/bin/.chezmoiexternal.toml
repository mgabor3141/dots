{{- if ne .chezmoi.os "darwin" }}
{{- $gmuxVersion := (gitHubLatestRelease "gmuxapp/gmux").TagName }}
["gmux"]
    type = "archive-file"
    url = "https://github.com/gmuxapp/gmux/releases/download/{{ $gmuxVersion }}/gmux_{{ trimPrefix "v" $gmuxVersion }}_linux_{{ .chezmoi.arch }}.tar.gz"
    executable = true
    path = "gmux"
    refreshPeriod = "168h"

["gmuxd"]
    type = "archive-file"
    url = "https://github.com/gmuxapp/gmux/releases/download/{{ $gmuxVersion }}/gmux_{{ trimPrefix "v" $gmuxVersion }}_linux_{{ .chezmoi.arch }}.tar.gz"
    executable = true
    path = "gmuxd"
    refreshPeriod = "168h"
{{- end }}

