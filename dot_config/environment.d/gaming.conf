# Gaming environment variables (session-wide via systemd environment.d)
# Changes require re-login to take effect.
#
# Compositor: niri (tiling Wayland)
# GPU: NVIDIA RTX 3080 Ti
# Kernel: CachyOS (ships ntsync module)
#
# Per-game overrides go in Steam launch options. Common overrides:
#
#   PROTON_ENABLE_WAYLAND=0 %command%
#     Disable winewayland for games that break (black screen, input issues).
#
#   SDL_VIDEODRIVER=windows %command%
#     Required for Proton games whose Windows SDL binary reads this var.
#     Without it, the game's SDL sees "wayland" and crashes (no such backend
#     exists in Windows SDL). Native Linux games don't need this.
#
#   PROTON_LOG=1 %command%
#     Enable Wine debug logging. Writes to PROTON_LOG_DIR (see below).
#     Adds +seh/+unwind debug channels which are verbose; don't leave on
#     permanently. Costs a few percent CPU on exception-heavy paths.
#
# Known per-game launch options:
#
#   Deadlock (1422450):
#     SDL_VIDEODRIVER=windows PROTON_ENABLE_WAYLAND=0 game-performance %command%
#     Also needs: video.txt fullscreen=0 (borderless window) for niri.
#     Exclusive fullscreen causes black screen until alt-tab on XWayland+niri.

# --- Nvidia ---

# Increase shader cache to 12GB and prevent cleanup.
# Avoids re-compilation stuttering in large games.
__GL_SHADER_DISK_CACHE_SIZE=12000000000
__GL_SHADER_DISK_CACHE_SKIP_CLEANUP=1

# --- Proton ---

# Auto-upgrade DLSS to the latest version bundled with Proton.
PROTON_DLSS_UPGRADE=1

# Use native winewayland.drv instead of XWayland.
# Lower latency and no XWayland translation overhead for supported games.
# Games that don't support it silently fall back to winex11.
# Caveats: Steam overlay doesn't work; some games have input/display issues.
PROTON_ENABLE_WAYLAND=1

# Use NTSync (native kernel synchronization) instead of Wine fsync/esync.
# CachyOS kernel ships the ntsync module (/dev/ntsync).
# Note: as of Proton Experimental 10.0-20260312, logs still show
# "fsync: up and running" instead of ntsync. May not be active yet.
PROTON_USE_NTSYNC=1

# Write Proton logs to /tmp (tmpfs, no disk I/O cost).
# Logs are only written when PROTON_LOG=1 is set per-game.
PROTON_LOG_DIR=/tmp

# --- MangoHud ---

# Enable globally. Hidden by default via no_display in MangoHud.conf.
# Toggle with Shift_R+F12 in-game.
MANGOHUD=1

# --- Steam ---

# Use native Wayland for the Steam UI itself (not XWayland).
STEAM_ENABLE_WAYLAND=1

# --- Variables intentionally NOT set globally ---
#
# SDL_VIDEODRIVER:
#   DO NOT set globally. Native Linux SDL2/SDL3 games auto-detect Wayland.
#   Setting SDL_VIDEODRIVER=wayland breaks every Proton game that ships a
#   Windows SDL binary (e.g. Deadlock's SDL3.dll) because Windows SDL has
#   no wayland backend. The game gets a NULL display and crashes.
#
# PROTON_NO_WM_DECORATION:
#   DO NOT set on niri. XWayland windows on tiling Wayland compositors
#   don't have decorations anyway. Setting this to 1 causes black screen
#   on launch (window not mapped/focused correctly by the compositor).
#   It was designed for X11 window managers.
