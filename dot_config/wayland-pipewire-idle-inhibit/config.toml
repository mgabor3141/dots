verbosity = "WARN"
media_minimum_duration = 5
idle_inhibitor = "wayland"
sink_whitelist = []

# Blacklist PipeWire loopback streams (virtual audio routing for system-audio
# and discord-audio sinks) and speech-dispatcher. These are always connected
# and un-corked, which makes the idle inhibitor think audio is always playing.
[[node_blacklist]]
name = ".*loopback.*"

[[node_blacklist]]
name = "speech-dispatcher.*"
