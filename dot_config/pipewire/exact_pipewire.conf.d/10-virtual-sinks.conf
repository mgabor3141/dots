# Virtual audio sinks and sources with loopback to/from Scarlett
#
# Each libpipewire-module-loopback creates two nodes linked internally.
# WirePlumber handles linking to hardware via target.object.
#
# Sinks (output):
#   - capture side (Audio/Sink): the virtual sink apps connect to
#   - playback side (Stream/Output/Audio): auto-links to the Scarlett output
#
# Sources (input):
#   - capture side (Stream/Input/Audio): auto-links to the Scarlett mic
#   - playback side (Audio/Source): the virtual source apps read from

context.modules = [
    # System Audio — default sink for all apps
    { name = libpipewire-module-loopback
      args = {
        audio.position = [ FL FR ]
        capture.props = {
            media.class      = Audio/Sink
            node.name        = system-audio
            node.description = "System Audio"
        }
        playback.props = {
            media.class       = Stream/Output/Audio
            node.name         = system-audio-playback
            node.description  = "System Audio → Scarlett"
            node.passive      = true
            stream.dont-remix = true
            node.autoconnect  = true
            target.object     = alsa_output.usb-Focusrite_Scarlett_8i6_USB_F8D9XVT150B68B-00.analog-surround-21
            node.dont-reconnect = true
        }
      }
    }
    # Comms — dedicated sink for Discord/comms
    { name = libpipewire-module-loopback
      args = {
        audio.position = [ FL FR ]
        capture.props = {
            media.class      = Audio/Sink
            node.name        = comms
            node.description = "Comms"
        }
        playback.props = {
            media.class       = Stream/Output/Audio
            node.name         = comms-playback
            node.description  = "Comms → Scarlett"
            node.passive      = true
            stream.dont-remix = true
            node.autoconnect  = true
            target.object     = alsa_output.usb-Focusrite_Scarlett_8i6_USB_F8D9XVT150B68B-00.analog-surround-21
            node.dont-reconnect = true
        }
      }
    }
    # Mic — default source for all apps (muting this leaves handy unaffected)
    { name = libpipewire-module-loopback
      args = {
        audio.position = [ FL FR ]
        capture.props = {
            media.class       = Stream/Input/Audio
            node.name         = mic-capture
            node.description  = "Mic ← Scarlett"
            node.passive      = true
            stream.dont-remix = true
            node.autoconnect  = true
            target.object     = alsa_input.usb-Focusrite_Scarlett_8i6_USB_F8D9XVT150B68B-00.multichannel-input
            node.dont-reconnect = true
        }
        playback.props = {
            media.class      = Audio/Source
            node.name        = mic
            node.description = "Microphone"
        }
      }
    }
]
