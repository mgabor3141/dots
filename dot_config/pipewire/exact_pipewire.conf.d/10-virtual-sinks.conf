# Virtual audio sinks with loopback to Scarlett
#
# Each libpipewire-module-loopback creates:
#   - capture side (Audio/Sink): the virtual sink apps connect to
#   - playback side (Stream/Output/Audio): auto-links to the Scarlett
#
# WirePlumber handles linking the playback side via target.object,
# waiting for the Scarlett to appear if needed.

context.modules = [
    # System Audio — default sink for all apps
    { name = libpipewire-module-loopback
      args = {
        audio.position = [ FL FR ]
        capture.props = {
            media.class      = Audio/Sink
            node.name        = system-audio
            node.description = "System Audio"
        }
        playback.props = {
            media.class       = Stream/Output/Audio
            node.name         = system-audio-playback
            node.description  = "System Audio → Scarlett"
            node.passive      = true
            stream.dont-remix = true
            node.autoconnect  = true
            target.object     = alsa_output.usb-Focusrite_Scarlett_8i6_USB_F8D9XVT150B68B-00.analog-surround-21
            node.dont-reconnect = true
        }
      }
    }
    # Comms — dedicated sink for Discord/comms
    { name = libpipewire-module-loopback
      args = {
        audio.position = [ FL FR ]
        capture.props = {
            media.class      = Audio/Sink
            node.name        = comms
            node.description = "Comms"
        }
        playback.props = {
            media.class       = Stream/Output/Audio
            node.name         = comms-playback
            node.description  = "Comms → Scarlett"
            node.passive      = true
            stream.dont-remix = true
            node.autoconnect  = true
            target.object     = alsa_output.usb-Focusrite_Scarlett_8i6_USB_F8D9XVT150B68B-00.analog-surround-21
            node.dont-reconnect = true
        }
      }
    }
]
