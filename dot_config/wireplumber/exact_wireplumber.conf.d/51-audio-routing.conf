# Audio routing policy
#
# - Default sink is system-audio (all apps route here)
# - Default source is mic (loopback wrapping the Scarlett mic)
#     * mute hotkey mutes the "mic" loopback → apps get silence
#     * handy bypass: mute-events-handler rewires handy to the raw Scarlett
#       via pw-link (WirePlumber can't resolve raw hardware as a stream target)
# - Comms (Discord, etc.) → comms sink (via stream-restore saved target)
# - Sunshine captures system-audio.monitor → gets everything except comms
# - Virtual sinks/sources defined in pipewire.conf.d/10-virtual-sinks.conf
# - Unused audio devices disabled (Behringer UCA, NVIDIA HDMI)

wireplumber.settings = {
  default.configured.audio.sink = "system-audio"
  default.configured.audio.source = "mic"
}

# ALSA device and node rules
# - Disable Behringer UCA (KVM hub for MacBook mic return, not used on Linux)
# - Disable NVIDIA HDMI/DP (monitor speakers, unused; audio goes through Scarlett)
# - Deprioritize Sunshine sinks so they don't become default
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.usb-Burr-Brown_from_TI_USB_Audio_CODEC-00" }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
  {
    matches = [
      { device.name = "alsa_card.pci-0000_01_00.1" }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
  {
    matches = [
      { node.name = "~sink-sunshine-.*" }
    ]
    actions = {
      update-props = {
        priority.session = 0
      }
    }
  }
]
