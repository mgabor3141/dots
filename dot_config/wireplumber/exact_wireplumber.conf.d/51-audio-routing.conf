# Audio routing policy
#
# - Default sink is system-audio (all apps route here)
# - Comms (Discord, etc.) → comms sink (via stream-restore saved target)
# - Sunshine captures system-audio.monitor → gets everything except comms
# - Virtual sinks defined in pipewire.conf.d/10-virtual-sinks.conf
# - Connections managed by qpwgraph patchbay

wireplumber.settings = {
  default.configured.audio.sink = "system-audio"
}

wireplumber.profiles = {
  main = {
    node.rules = [
      # Prevent Sunshine sinks from becoming default
      {
        matches = [
          { node.name = "~sink-sunshine-.*" }
        ]
        actions = {
          update-props = {
            priority.session = 0
            node.autoconnect = false
          }
        }
      }
      # Prevent Scarlett mic from auto-connecting to sinks
      {
        matches = [
          { node.name = "~alsa_input.usb-Focusrite_Scarlett_8i6_USB_.*" media.class = "Audio/Source" }
        ]
        actions = {
          update-props = {
            node.autoconnect = false
          }
        }
      }
    ]
  }
}
