# Audio routing policy
#
# - Default sink is system-audio (all apps route here)
# - Default source is the Scarlett mic (used by Discord, etc.)
# - Comms (Discord, etc.) → comms sink (via stream-restore saved target)
# - Sunshine captures system-audio.monitor → gets everything except comms
# - Virtual sinks defined in pipewire.conf.d/10-virtual-sinks.conf
# - Unused audio devices disabled (Behringer UCA, NVIDIA HDMI, motherboard)

wireplumber.settings = {
  default.configured.audio.sink = "system-audio"
  default.configured.audio.source = "alsa_input.usb-Focusrite_Scarlett_8i6_USB_F8D9XVT150B68B-00.multichannel-input"
}

# Disable audio devices that aren't part of the routing:
# - Behringer UCA: on KVM hub for MacBook mic return, not used on Linux
# - NVIDIA HDMI/DP: monitor built-in speakers, unused (audio goes through Scarlett)
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.usb-Burr-Brown_from_TI_USB_Audio_CODEC-00" }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
  {
    matches = [
      { device.name = "alsa_card.pci-0000_01_00.1" }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
]

wireplumber.profiles = {
  main = {
    node.rules = [
      # Prevent Sunshine sinks from becoming default
      {
        matches = [
          { node.name = "~sink-sunshine-.*" }
        ]
        actions = {
          update-props = {
            priority.session = 0
            node.autoconnect = false
          }
        }
      }
      # Prevent Scarlett mic from auto-connecting to sinks
      {
        matches = [
          { node.name = "~alsa_input.usb-Focusrite_Scarlett_8i6_USB_.*" media.class = "Audio/Source" }
        ]
        actions = {
          update-props = {
            node.autoconnect = false
          }
        }
      }
    ]
  }
}
