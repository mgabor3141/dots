# xremap config
#
# Reads from Kanata's virtual output (Razer) and the Go60 directly.
#
# NOTE: Steam/Proton games bypass the compositor's input, so per-app
# keymap matching doesn't work reliably for games. Use modmap for
# global remaps that always apply.

# --- Global modmap (always active) ---
modmap:
  - name: Global
    remap:
      Enter: Space
      I: Up
      J: Left
      K: Down
      L: Right
