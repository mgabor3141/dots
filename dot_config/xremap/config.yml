# xremap config
#
# Keyboard-independent: the service grabs ALL keyboards (no --device filter).
# Every rule here is app-scoped (application.only: [...]), so typing in any
# other app is passed through untouched. This is why a global, unscoped
# remap must NEVER be added without a matching `application` filter.
#
# Steam/Proton games can be remapped per-app, but you must:
#   Steam → Library → right-click game → Properties → Controller
#   → "Override default input type" → "Disable Steam Input"
# Then restart the game.

# Use modmap (not keymap) for per-app remapping so that hold-to-repeat works.
# keymap fires a one-shot press+release on key-down, which breaks held-direction
# input for games. modmap does true 1:1 substitution and tracks key-up.
modmap:
  # Animal Well
  - name: Animal Well
    application:
      only: [steam_app_813230]
    remap:
      Enter: Space
      E: Up
      S: Left
      D: Down
      F: Right
      J: Z
      K: X
      L: C
      Semicolon: V
      "2": "1"
      "4": "3"

  # MECCHA CHAMELEON
  # Whole hand shifted one column right: press ESDF for movement (WASD),
  # and every key emits the key immediately to its left.
  - name: MECCHA CHAMELEON
    application:
      only: [steam_app_4704690]
    remap:
      # Top row
      W: Q
      E: W
      R: E
      T: R
      Y: T
      U: Y
      I: U
      O: I
      P: O
      # Home row
      S: A
      D: S
      F: D
      G: F
      H: G
      J: H
      K: J
      L: K
      Semicolon: L
      # Bottom row
      X: Z
      C: X
      V: C
      B: V
      N: B
      M: N
      Comma: M
      Dot: Comma
      Slash: Dot

keymap: []
